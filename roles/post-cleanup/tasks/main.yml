---
- name: convert bootstrap-script to ssh connection
  community.general.git_config:
    scope: local
    repo: '/home/{{ user }}/projects/bootstrap-script'
    name: remote.origin.url
    value: 'git@github.com:shaun-moate/bootstrap-script.git'

- name: sync doom.emacs
  command: '/home/{{ user }}/.emacs.d/bin/doom sync'
